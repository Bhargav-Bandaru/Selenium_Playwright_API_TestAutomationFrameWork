# ══════════════════════════════════════════════════════════════════════════════
# ExpertRise BDD Framework — Configuration
# Override any value via system property: -Dbase.url=https://...
# ══════════════════════════════════════════════════════════════════════════════

# ── Application URLs ──────────────────────────────────────────────────────────
base.url=https://automationexercise.com
api.base.url=http://localhost:3000
practice.url=https://testautomationpractice.blogspot.com

# ── Browser ───────────────────────────────────────────────────────────────────
# Options: chrome | firefox | edge | safari
browser=chrome
# Run headless in CI: -Dheadless=true
headless=false

# ── Playwright ────────────────────────────────────────────────────────────────
# Options: chromium | firefox | webkit
playwright.browser=chromium

# ── Timeouts (seconds) ────────────────────────────────────────────────────────
explicit.wait.seconds=15
page.load.timeout.seconds=30
api.timeout.seconds=30

# ── Reporting ─────────────────────────────────────────────────────────────────
extent.report.dir=target/extent-reports
screenshots.dir=target/screenshots
allure.results.dir=target/allure-results

# ── Environment ───────────────────────────────────────────────────────────────
# Override: -Denv=staging
env=QA
