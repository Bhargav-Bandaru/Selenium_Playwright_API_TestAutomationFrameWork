# Cucumber JUnit 5 Platform Configuration

cucumber.junit-platform.naming-strategy=long

cucumber.plugin=pretty, json:target/cucumber.json, html:target/cucumber-reports.html, io.qameta.allure.cucumber7jvm.AllureCucumber7Jvm

cucumber.glue=com.expertrise.automation.stepDefinitions,com.expertrise.automation.hooks

# Default tag filter (optional)
cucumber.filter.tags=@smoke

# Parallel execution
cucumber.execution.parallel.enabled=true
cucumber.execution.parallel.config.strategy=fixed
cucumber.execution.parallel.config.fixed.parallelism=4
